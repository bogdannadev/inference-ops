services:
  qwen3-embedding:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    container_name: qwen3-embedding
    ipc: host
    shm_size: "2g"
    ports:
      - "30000:30000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ./logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - PYTHONUNBUFFERED=1
      - VLLM_LOGGING_LEVEL=INFO
    command: >
      --model Qwen/Qwen3-Embedding-0.6B
      --runner pooling
      --port 30000
      --host 0.0.0.0
      --served-model-name qwen3-embedding-0.6b
      --trust-remote-code
      --max-model-len 32768
      --gpu-memory-utilization 0.90
      --dtype half
      --max-num-seqs 256
      --enforce-eager
      --uvicorn-log-level info
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:30000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
