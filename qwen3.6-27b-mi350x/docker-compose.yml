# =============================================================================
# QWEN3.6-27B-BF16 — SGLANG TP=1 on a single MI350X (AMD sgl-dev, ROCm 7.2)
# Low-concurrency coding sessions (opencode, ~2 users), Spec Decode (NEXTN) enabled.
# =============================================================================
# Image:    rocm/sgl-dev:v0.5.12.post1-rocm720-mi35x-20260607  (FREEZE the digest)
#             docker buildx imagetools inspect \
#               rocm/sgl-dev:v0.5.12.post1-rocm720-mi35x-20260607
#
# Hardware: 1x AMD Instinct MI350X (CDNA4 / gfx950), DO droplet.
#           Confirm you have a FULL card, not a CPX/VF partition:
#             amd-smi static | grep -i partition
#
# Model:    Qwen/Qwen3.6-27B (official, bfloat16 weights, ~54 GB).
#           Default ctx 262144. Qwen advise keeping >=128K to preserve thinking.
#
# KEY CONFIGURATION CHOICES:
#   - BF16 weights (not FP8). The --dtype bfloat16 flag is explicit. FP8 was
#     dropped due to garbage-output reports on this checkpoint family (HF disc #8).
#     BF16 is the safe baseline — verify coherence before any precision change.
#   - SPEC DECODE (NEXTN) ENABLED. Draft token generation via NEXTN with 3 steps,
#     topk=1, 4 draft tokens. This is mutually exclusive with HiCache:
#     HiCache + NEXTN + host-pool eviction is a documented crash (sglang #23429).
#     If you need HiCache, remove all --speculative-* flags first.
#   - MAMBA SSM SUPPORT. --mamba-scheduler-strategy no_buffer and
#     --mamba-ssm-dtype bfloat16 are set for hybrid GDN/Mamba architectures.
#     --mamba-full-memory-ratio 0.7 sizes the recurrent-state pool so ~2 sessions'
#     state survives between turns. Watch mamba-pool occupancy in /metrics.
#   - LOW CONCURRENCY. --max-running-requests 2 and --cuda-graph-max-bs 2 match
#     a 2-user target. --chunked-prefill-size 8192 and --enable-mixed-chunk
#     prevent one user's long prefill from freezing the other's decode.
#   - TOOL CALLING + GRAMMAR. --tool-call-parser qwen3_coder and
#     --grammar-backend xgrammar enable structured tool-use outputs.
#     --reasoning-parser qwen3 handles the thinking-tag format.
#   - KV CACHE AT DEFAULT BF16. No --kv-cache-dtype override. With ~192 GB HBM3
#     and BF16 weights at ~54 GB, you have ~130+ GB spare for KV. No need to
#     quantize the cache.
#   - --mem-fraction-static 0.90: reserve 90% of VRAM for static allocation
#     (weights + KV pool). Leaves 10% for OS / ROCm overhead.
#   - AITER GEMM path enabled via SGLANG_USE_AITER=1. PYTORCH_HIP_ALLOC_CONF
#     uses expandable_segments for better memory fragmentation on ROCm.
#
# SANITY CHECK BEFORE TRUSTING OUTPUT:
#   Send one plain prompt and confirm COHERENT text. If gibberish:
#   suspect chat template / parser, then speculative decode config.
#
# Verify every flag against `--help` inside THIS image before boot; names drift.
# =============================================================================

services:
  qwen36-27b-sgldev-mi350x:
    image: rocm/sgl-dev:v0.5.13-rocm720-mi35x-20260612
    container_name: qwen36-27b-sgldev-mi350x
    ipc: host
    shm_size: "32g"

    ports:
      - "8002:8002"

    devices:
      - /dev/kfd
      - /dev/dri

    group_add:
      - video
      - render

    security_opt:
      - seccomp:unconfined

    cap_add:
      - SYS_PTRACE

    volumes:
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
      - ./logs:/app/logs
      - /etc/localtime:/etc/localtime:ro

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - PYTHONUNBUFFERED=1
      - SGLANG_USE_AITER=1
      - PYTORCH_HIP_ALLOC_CONF=expandable_segments:True
      - SGLANG_API_KEY=${SGLANG_API_KEY:-}

    entrypoint: python3 -m sglang.launch_server
    command: >
      --model-path Qwen/Qwen3.6-27B
      --served-model-name qwen36-27b
      --host 0.0.0.0
      --port 8002
      --trust-remote-code
      --dtype bfloat16
      --context-length 262144
      --attention-backend triton
      --mamba-scheduler-strategy no_buffer
      --mamba-ssm-dtype bfloat16
      --mamba-full-memory-ratio 0.7
      --page-size 64
      --mem-fraction-static 0.90
      --chunked-prefill-size 8192
      --max-prefill-tokens 16384
      --max-running-requests 2
      --cuda-graph-max-bs 2
      --enable-mixed-chunk
      --schedule-policy lpm
      --reasoning-parser qwen3
      --tool-call-parser qwen3_coder
      --grammar-backend xgrammar
      --allow-auto-truncate
      --speculative-attention-mode decode
      --speculative-algo NEXTN
      --speculative-num-steps 3
      --speculative-eagle-topk 1
      --speculative-num-draft-tokens 4
      --enable-metrics
      --enable-cache-report
      --watchdog-timeout 1200
      --api-key ${SGLANG_API_KEY}

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 2400s

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

networks:
  default:
    name: qwen36-27b-fp8-mi300x-network