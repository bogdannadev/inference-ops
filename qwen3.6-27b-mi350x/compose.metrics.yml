# =============================================================================
# compose.metrics.yml — Prometheus + Grafana + AMD GPU Exporter
# -----------------------------------------------------------------------------
# This is a compose OVERRIDE. It adds Prometheus, Grafana, and the amd-smi
# exporter alongside your existing SGLang service. Merged explicitly with -f.
#
# RUN / KÖR:
#   docker compose -f docker-compose.yml -f compose.metrics.yml up -d
#
# STOP / STOPPA:
#   docker compose -f docker-compose.yml -f compose.metrics.yml down
#
# ACCESS / ÅTKOMST:
#   Prometheus:  http://localhost:9090
#   Grafana:     http://localhost:3000  (admin / ${GRAFANA_ADMIN_PASSWORD:-admin})
#   AMD Exporter: http://localhost:9300/metrics
#
# ROCMPROFV3 PROFILING (on-demand, not continuous):
#   python3 rocprofv3_profile.py --duration 30 --pmcs basic
#   python3 rocprofv3_profile.py --duration 60 --pmcs full
#   python3 rocprofv3_profile.py --pmcs list
# =============================================================================

services:
  prometheus:
    image: prom/prometheus:v3.12.0     # current stable, pinned / aktuell stabil, fastnålad
    container_name: sglang-prometheus

    ports:
      - "9090:9090"                    # web UI + query API / webbgränssnitt + fråge-API

    volumes:
      # The scrape config (read-only) / skrapkonfigurationen (skrivskyddad):
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Named volume so the TSDB survives container restarts.
      # Namngiven volym så att tidsseriedatabasen överlever omstart.
      - prometheus-data:/prometheus

    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      # Keep ~30 days of history; tune to taste. / Behåll ca 30 dagars historik.
      - --storage.tsdb.retention.time=30d
      # Allows `curl -X POST localhost:9090/-/reload` after editing the config.
      # Tillåter omladdning av config utan omstart.
      - --web.enable-lifecycle

    restart: unless-stopped

    # No `networks:` key on purpose: the service joins the base compose's
    # `default` network, so it can resolve "qwen36-27b-sgldev-mi350x" by name.

  amd-smi-exporter:
    image: python:3.12-slim
    container_name: amd-smi-exporter

    ports:
      - "9300:9300"

    devices:
      - /dev/kfd
      - /dev/dri

    group_add:
      - video

    security_opt:
      - seccomp:unconfined

    cap_add:
      - SYS_PTRACE

    volumes:
      - ./amd_smi_exporter.py:/app/amd_smi_exporter.py:ro
      - /opt/rocm:/opt/rocm:ro
      - /usr/bin/amd-smi:/usr/bin/amd-smi:ro
      - /usr/lib/x86_64-linux-gnu/libdrm.so.2:/usr/lib/x86_64-linux-gnu/libdrm.so.2:ro
      - /usr/lib/x86_64-linux-gnu/libdrm_amdgpu.so.1:/usr/lib/x86_64-linux-gnu/libdrm_amdgpu.so.1:ro
      - /etc/group:/etc/group:ro

    environment:
      - PATH=/opt/rocm/bin:/usr/local/bin:/usr/local/sbin:/usr/sbin:/usr/bin:/sbin:/bin
      - LD_LIBRARY_PATH=/opt/rocm/lib:/usr/lib/x86_64-linux-gnu

    command: ["python3", "/app/amd_smi_exporter.py", "9300"]

    restart: unless-stopped

    depends_on:
      - prometheus

  grafana:
    image: grafana/grafana:11.6.0
    container_name: sglang-grafana

    ports:
      - "3000:3000"

    volumes:
      - ./grafana/datasources/datasource.yaml:/etc/grafana/provisioning/datasources/datasource.yaml:ro
      - ./grafana/dashboards/config/dashboard.yaml:/etc/grafana/provisioning/dashboards/dashboard.yaml:ro
      - ./grafana/dashboards/json:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana

    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}

    restart: unless-stopped

    depends_on:
      - prometheus

# Top-level volume declarations.
volumes:
  prometheus-data:
  grafana-data: