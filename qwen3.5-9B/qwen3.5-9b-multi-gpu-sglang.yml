# =============================================================================
# QWEN3.5-9B SGLANG DEPLOYMENT — LEGAL RAG + VISION
# =============================================================================
#
# Hardware:   4× RTX A4000 (16 GB each, SM86 Ampere, PCIe 3.0) = 64 GB total
# Model:      Qwen/Qwen3.5-9B (~5B params dense, ~10 GB BF16 per shard at TP=4)
# Engine:     SGLang nightly (CUDA 13, April 2026)
# Workload:   Legal document RAG with optional document image understanding
#
# =============================================================================
# ARCHITECTURE — QWEN3.5 HYBRID (GDN + GQA)
# =============================================================================
#
#   Layout: 8 × (3 × (Gated DeltaNet → FFN) → 1 × (Gated Attention → FFN))
#
#   - 24 of 32 layers: Gated DeltaNet (linear attention, O(1) per token)
#   - 8 of 32 layers:  standard GQA (quadratic, maintains KV cache)
#   - Only 8 GQA layers maintain KV cache → ~75% memory reduction vs Qwen3
#
#   KV cache math (8 attention layers):
#     4 KV heads × 256 head_dim × 2 (K+V) × 2 bytes (BF16) = 4 KB/token/layer
#     8 layers × 4 KB = 32 KB/token total
#     With TP=4: 8 KB/token/GPU
#
#   DeltaNet layers maintain fixed-size recurrent state — does NOT grow
#   with sequence length. This is the key efficiency advantage.
#
#   Native context: 262,144 tokens (no YaRN needed for ≤262K)
#   Multimodal:     Built-in vision encoder (early fusion)
#   Thinking mode:  <think>...</think> by default, disabled via API
#
# =============================================================================
# DELTANET-SPECIFIC CONSTRAINTS
# =============================================================================
#
# 1. ATTENTION BACKEND: FlashInfer may fail on DeltaNet layers.
#    If startup crashes → add --attention-backend triton.
#
# 2. RADIX CACHE: HiRadixCache blocked ("only supports MHA and MLA").
#    Standard RadixAttention may work for 8 GQA layers.
#    Use --enable-cache-report to verify. If 0% hits → use fcfs.
#
# 3. FP8 KV CACHE: May cause silent corruption with DeltaNet.
#    Test carefully before production.
#
# 4. CUDA GRAPHS: May conflict with DeltaNet Triton kernels.
#    If graph capture fails → add --disable-cuda-graph.
#
# =============================================================================
# VRAM BUDGET PER GPU (TP=4, mem_fraction=0.75, all optimisations active)
# =============================================================================
#
#   Usable:                      12,288 MB  (16,384 × 0.75)
#   Model weights (BF16/TP=4):   ~5,000 MB  (20 GB / 4 GPUs)
#   Vision encoder:                ~250 MB
#   CUDA graphs + torch.compile: ~1,200 MB  (compiled graphs are larger)
#   Mamba state buffers (V2):      ~500 MB  (extra_buffer overhead)
#   MTP draft buffers:             ~500 MB  (speculative token workspace)
#   Scheduler + activations:       ~300 MB
#   ─────────────────────────────────────────────────────────────
#   Available for KV cache:      ~4,538 MB
#
#   At 8 KB/token/GPU:
#     4,538 MB / 8 KB ≈ 567K tokens total capacity
#     At 65K context: ~8 concurrent sessions (theoretical)
#     max-running-requests=4 at 65K → ~260K tokens → 46% utilisation (safe)
#
# =============================================================================
# IMAGE COMPATIBILITY WARNING — CUDA 13 ON SM86
# =============================================================================
#
# This image uses CUDA 13. SM86 (A4000) is Ampere and architecturally
# compatible, but requires NVIDIA driver ≥570. Verify before deploying:
#   nvidia-smi --query-gpu=driver_version --format=csv,noheader
#
# If you see "no kernel image is available for execution on the device",
# fall back to the cu12 image:
#   lmsysorg/sglang:nightly-dev-20260302-8a0b7575
#
# The cu13 nightly includes:
#   - Qwen3.5 GDN/KDA Optimization (transposed linear attention state layout)
#   - Transformers 5.3.0 upgrade
#   - Flash Attention 4 support (SM86 compatible via sgl-kernel)
#   - HiSparse sparse attention backend for long-context
#
# =============================================================================

services:
    qwen35-9b-sglang:

        image: lmsysorg/sglang:nightly-dev-cu13-20260407-5cc246e0

        container_name: qwen35-9b-sglang

        ipc: host
        shm_size: "8g"

        ports:
            - "8002:8002"

        volumes:
            - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
            - ./logs:/app/logs
            - /etc/localtime:/etc/localtime:ro
            # Triton + torch kernel caches — critical for restart speed.
            # First start (all optimisations): 10-20 min
            # Subsequent starts (cached): 3-5 min
            - ./sglang_cache:/root/.cache/torch
            - ./inductor_cache:/root/.cache/inductor

        environment:
            - HF_TOKEN=${HF_TOKEN:-}
            - PYTHONUNBUFFERED=1
            - TORCHINDUCTOR_CACHE_DIR=/root/.cache/inductor
            # V2 overlap scheduler — required for --mamba-scheduler-strategy extra_buffer.
            # Without this, SGLang silently falls back to V1 (no_buffer).
            - SGLANG_ENABLE_SPEC_V2=True

            # Uncomment if CuDNN version issues with vision encoder Conv3d:
            # - SGLANG_DISABLE_CUDNN_CHECK=1

            # NCCL debugging for tensor parallelism issues:
            # - NCCL_DEBUG=INFO
            # - NCCL_ALGO=Ring

        entrypoint: python3 -m sglang.launch_server

        # =================================================================
        # COMMAND FLAGS REFERENCE
        # =================================================================
        #
        # --model-path Qwen/Qwen3.5-9B        HF model (~20 GB download)
        # --served-model-name qwen35-9b        API model name
        # --trust-remote-code                  Required for GDN + MROPE
        # --tp 4                               TP across 4 GPUs (~5 GB/GPU)
        # --context-length 65536               65K native, no YaRN
        # --reasoning-parser qwen3             Parses <think>...</think>
        # --tool-call-parser qwen3_coder       Hermes-style tool calls
        # --mem-fraction-static 0.75           Reduced for compile+MTP+V2
        # --chunked-prefill-size 8192          8K chunks for legal docs
        # --max-running-requests 4             Reduced for MTP draft buffers
        # --schedule-policy lpm                RadixAttention prefix caching
        # --schedule-conservativeness 1.0      Conservative for legal workloads
        # --mamba-scheduler-strategy extra_buffer   V2 overlap scheduler
        # --page-size 64                       FLA_CHUNK_SIZE alignment
        # --enable-torch-compile               Kernel fusion via inductor
        # --speculative-algo NEXTN             MTP speculative decoding
        # --speculative-num-steps 3            MTP lookahead depth
        # --speculative-eagle-topk 1           MTP top-k candidates
        # --speculative-num-draft-tokens 4     MTP draft token count
        # --enable-p2p-check                   GPU P2P topology check
        # --dtype bfloat16                     Training precision
        # --enable-metrics                     Prometheus at /metrics
        # --enable-cache-report                Prefix cache hit rate logging
        # --log-requests                       Request metadata logging
        #
        # TROUBLESHOOTING:
        #   FlashInfer crash     → add --attention-backend triton
        #   CUDA graph OOM       → add --cuda-graph-max-bs 8 or 0.70 mem
        #   torch.compile fail   → remove --enable-torch-compile
        #   MTP accept_len < 1.5 → remove all 4 speculative flags
        #   cache_hit_rate = 0   → change --schedule-policy to fcfs
        # =================================================================

        command: >
            --model-path Qwen/Qwen3.5-9B
            --port 8002
            --host 0.0.0.0
            --served-model-name qwen35-9b
            --trust-remote-code
            --tp 4
            --context-length 65536
            --reasoning-parser qwen3
            --tool-call-parser qwen3_coder
            --mem-fraction-static 0.75
            --chunked-prefill-size 8192
            --max-running-requests 4
            --schedule-policy lpm
            --schedule-conservativeness 1.0
            --mamba-scheduler-strategy extra_buffer
            --page-size 64
            --speculative-algo NEXTN
            --speculative-num-steps 3
            --speculative-eagle-topk 1
            --speculative-num-draft-tokens 4
            --enable-p2p-check
            --dtype bfloat16
            --enable-metrics
            --enable-cache-report
            --log-requests

        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          device_ids: ["0", "1", "2", "3"]
                          capabilities: [gpu]

        restart: unless-stopped

        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 600s

        logging:
            driver: "json-file"
            options:
                max-size: "50m"
                max-file: "5"

networks:
    default:
        name: qwen35-sglang-network


