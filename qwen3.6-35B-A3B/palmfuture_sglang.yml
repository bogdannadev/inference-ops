# =============================================================================
# QWEN3.6-35B-A3B-GPTQ-INT4 — SGLANG TP=4 (palmfuture variant, text-only)
# =============================================================================
# Hardware:    4× RTX A4000 (16 GB, SM86, PHB-symmetric PCIe topology)
# Host RAM:    157 GB
# Model:       palmfuture/Qwen3.6-35B-A3B-GPTQ-Int4  (~25 GB Int4 weights)
# Workload:    Production agentic RAG over legal documents
# Architecture: Hybrid Gated Delta Networks + sparse MoE (35B total / 3B active)
#
# IMAGE NOTE: This nightly bundles v0.5.11 (May 5, 2026). Highlights relevant
# to this stack: GDN state layout transpose (#20283), GDN projection fused
# Triton kernel (#21019), Spec V2 with overlap scheduler as default (#21062),
# Piecewise CUDA Graph default ON (#16331) — must be explicitly disabled on
# SM86 at TP>1.
#
# RATIONALE FOR THIS BUILD vs QuantTrio AWQ:
#   - palmfuture publishes per-module quantisation log (auditable RTN rate)
#   - Per-expert split MTP weights match SGLang loader expectations natively
#   - Maintainer verified TP=4 on 4× RTX 3060 12 GB at SGLang 0.5.10 — same
#     TP topology as this deployment, tighter VRAM than A4000
#   - GPTQ-Int4 routes to gptq_marlin via --quantization moe_wna16; same
#     kernel-level performance as awq_marlin, only the calibration recipe
#     differs
#
# KNOWN CONSTRAINTS PRESERVED FROM PRIOR DEPLOYMENTS:
#   - --disable-piecewise-cuda-graph required (segfaults at TP>1 on SM86)
#   - --disable-custom-all-reduce required (no peer access on PCIe-only)
#   - --enable-torch-compile excluded (OOM at TP=4 with 35B-class models)
#   - HiCache flags omitted (#12826, #12867 still open as of May 7, 2026)
# =============================================================================

services:
  qwen36-35b-gptq-sglang-tp4:
    image: lmsysorg/sglang:nightly-dev-cu13-20260507-a9a8b20a
    container_name: qwen36-35b-gptq-sglang-tp4
    ipc: host
    shm_size: "8g"

    ports:
      - "8002:8002"

    volumes:
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
      - ./logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
      - ./sglang_cache_qwen36_gptq:/root/.cache/torch
      - ./inductor_cache_qwen36_gptq:/root/.cache/inductor

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - PYTHONUNBUFFERED=1
      - TORCHINDUCTOR_CACHE_DIR=/root/.cache/inductor
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - SGLANG_API_KEY=${SGLANG_API_KEY:-}

    entrypoint: python3 -m sglang.launch_server

    command: >
      --model-path palmfuture/Qwen3.6-35B-A3B-GPTQ-Int4
      --port 8002
      --host 0.0.0.0
      --served-model-name qwen36-35b-gptq
      --trust-remote-code
      --reasoning-parser qwen3
      --tool-call-parser qwen3_coder
      --dtype bfloat16
      --quantization moe_wna16
      --tp 4
      --context-length 131072
      --mem-fraction-static 0.85
      --chunked-prefill-size 4096
      --max-prefill-tokens 8192
      --max-running-requests 4
      --schedule-policy lpm
      --mamba-scheduler-strategy extra_buffer
      --mamba-full-memory-ratio 0.9
      --mamba-ssm-dtype bfloat16
      --page-size 64
      --speculative-algo NEXTN
      --speculative-num-steps 3
      --speculative-eagle-topk 1
      --speculative-num-draft-tokens 4
      --attention-backend flashinfer
      --mamba-backend triton
      --grammar-backend xgrammar
      --allow-auto-truncate
      --cuda-graph-max-bs 4
      --disable-piecewise-cuda-graph
      --disable-custom-all-reduce
      --enable-metrics
      --enable-cache-report
      --log-requests
      --log-requests-level 2
      --watchdog-timeout 1200
      --api-key ${SGLANG_API_KEY}

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0", "1", "2", "3"]
              capabilities: [gpu]

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 1800s

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

networks:
  default:
    name: qwen36-gptq-tp4-network
