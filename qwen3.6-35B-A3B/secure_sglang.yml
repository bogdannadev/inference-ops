# =============================================================================
# QWEN3.6-35B-A3B-AWQ — SGLANG TP=4 (Int4 weights, text-only, no offload)
# =============================================================================
# Hardware:    4× RTX A4000 (16 GB, SM86, PHB-symmetric PCIe topology)
# Host RAM:    157 GB
# Model:       QuantTrio/Qwen3.6-35B-A3B-AWQ  (~25 GB Int4 weights)
# Workload:    Coding agent exploration, agentic tasks
# Architecture: Hybrid Gated Delta Networks + sparse MoE (35B total / 3B active)
#
# IMAGE NOTE: Qwen3.6 was released ~17–19 April 2026. Your current nightly
# image tag (cu13-20260416) predates the Qwen3.6 weight release by ~3 days,
# so it likely lacks the model-loading glue for Qwen3.6's config. Pull a
# post-20-April nightly before first boot. If the image below 404s on pull,
# replace with the latest tag from https://hub.docker.com/r/lmsysorg/sglang/tags
# =============================================================================

services:
  qwen36-35b-awq-sglang-tp4:
    image: lmsysorg/sglang:nightly-dev-cu13-20260524-af8f6694
    container_name: qwen36-35b-awq-sglang-tp4
    ipc: host
    shm_size: "8g"

    ports:
      - "8002:8002"

    volumes:
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
      - ./logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
      - ./sglang_cache_qwen36_awq:/root/.cache/torch
      - ./inductor_cache_qwen36_awq:/root/.cache/inductor

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - PYTHONUNBUFFERED=1
      - TORCHINDUCTOR_CACHE_DIR=/root/.cache/inductor
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - SGLANG_API_KEY=${SGLANG_API_KEY:-}
      - SGLANG_HICACHE_MAX_PINNED_RATIO=0.15
      - PYTHON_EXECUTION_BACKEND=UV

    entrypoint: python3 -m sglang.launch_server
    command: >
      --model-path QuantTrio/Qwen3.6-35B-A3B-AWQ
      --port 8002
      --host 0.0.0.0
      --served-model-name qwen36-35b-awq
      --trust-remote-code
      --reasoning-parser qwen3
      --tool-call-parser qwen3_coder
      --dtype bfloat16
      --quantization moe_wna16
      --tp 4
      --enable-p2p-check
      --context-length 196608
      --mem-fraction-static 0.83
      --chunked-prefill-size 8192
      --max-prefill-tokens 16384
      --max-running-requests 4
      --schedule-policy lpm
      --mamba-scheduler-strategy extra_buffer
      --mamba-full-memory-ratio 0.9
      --mamba-ssm-dtype bfloat16
      --speculative-algo NEXTN
      --speculative-num-steps 3
      --speculative-eagle-topk 1
      --speculative-num-draft-tokens 4
      --enable-hierarchical-cache
      --hicache-ratio 4
      --hicache-write-policy write_through
      --hicache-mem-layout page_first_direct
      --page-size 64
      --hicache-io-backend kernel
      --attention-backend flashinfer
      --mamba-backend triton
      --grammar-backend xgrammar
      --allow-auto-truncate
      --cuda-graph-max-bs 4
      --disable-piecewise-cuda-graph
      --disable-custom-all-reduce
      --enable-metrics
      --enable-cache-report
      --log-requests
      --log-requests-level 2
      --watchdog-timeout 1200
      --api-key ${SGLANG_API_KEY}
      --enable-torch-compile
      --pre-warm-nccl
      --enable-tokenizer-batch-encode

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0", "1", "2", "3"]
              capabilities: [gpu]

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # Long start_period: Qwen3.6 first-run download is ~25 GB from HF,
      # plus TP=4 init + CUDA graph capture + MTP draft capture.
      # Subsequent warm starts ~5 min.
      start_period: 1800s

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

networks:
  default:
    name: qwen36-awq-tp4-network
