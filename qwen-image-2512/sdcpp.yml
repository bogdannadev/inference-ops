# ============================================================================
# stable-diffusion.cpp — Qwen-Image-Edit-2511 Server
# ============================================================================
#
# Deployment target:
#   GPU 1 (RTX A4000 16GB, SM86) — GPU 0 reserved for Qwen3.5-4B / SGLang
#
# VRAM budget (Q4_K_M):
#   Diffusion transformer: ~13.1 GB
#   Text encoder + VAE:    offloaded to CPU (90GB system RAM available)
#   Headroom:              ~2.9 GB for intermediate activations
#
# API endpoints (OpenAI-compatible):
#   POST /v1/images/generations  — text-to-image
#   POST /v1/images/edits        — image editing (watermark removal, etc.)
#   GET  /                       — embedded web UI (as of 2026-04-11)
#
# ============================================================================
#
# BEFORE FIRST RUN — download models to ./sdcpp-models/:
#
#   mkdir -p sdcpp-models sdcpp-outputs
#
#   # Diffusion model (Q4_K_M, ~13.1 GB)
#   curl -L -C - -o sdcpp-models/qwen-image-edit-2511-Q4_K_M.gguf \
#     https://huggingface.co/unsloth/Qwen-Image-Edit-2511-GGUF/resolve/main/qwen-image-edit-2511-Q4_K_M.gguf
#
#   # Text encoder (Q4_K_XL, ~5.3 GB)
#   curl -L -C - -o sdcpp-models/Qwen2.5-VL-7B-Instruct-UD-Q4_K_XL.gguf \
#     https://huggingface.co/unsloth/Qwen2.5-VL-7B-Instruct-GGUF/resolve/main/Qwen2.5-VL-7B-Instruct-UD-Q4_K_XL.gguf
#
#   # VAE (~330 MB)
#   curl -L -C - -o sdcpp-models/qwen_image_vae.safetensors \
#     https://huggingface.co/Comfy-Org/Qwen-Image_ComfyUI/resolve/main/split_files/vae/qwen_image_vae.safetensors
#
# ============================================================================
#
# TEST (after container is up):
#
#   # Text-to-image generation
#   curl http://localhost:8686/v1/images/generations \
#     -H "Content-Type: application/json" \
#     -d '{
#       "prompt": "A clean white background with text: Hello World",
#       "size": "1024x1024"
#     }' | jq -r '.data[0].b64_json' | base64 --decode > test_output.png
#
#   # Image editing (watermark removal)
#   curl http://localhost:8686/v1/images/edits \
#     -F "image=@input_with_watermark.png" \
#     -F "prompt=remove the watermark, restore the clean background" \
#     -F "size=1024x1024"
#
# ============================================================================

services:
  sdcpp-server:
    image: ghcr.io/leejet/stable-diffusion.cpp:master-cuda
    container_name: sdcpp-qwen-edit
    restart: unless-stopped

    # ── GPU isolation: pin to GPU 0 only ──
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

    ports:
      - "8686:8686"

    volumes:
      - ~/models:/models:ro
      - ~/outputs:/outputs

    # ── sd-server launch command ──
    # Key flags:
    #   --diffusion-model     : GGUF quantised DiT transformer
    #   --llm                 : GGUF quantised Qwen2.5-VL-7B text encoder
    #   --vae                 : safetensors VAE decoder
    #   --qwen-image-zero-cond-t : CRITICAL for 2511 editing quality
    #   --offload-to-cpu      : offload text encoder to system RAM
    #   --diffusion-fa        : enable flash attention for DiT
    #   --flow-shift 3        : recommended flow matching shift for Qwen-Image
    #   --cfg-scale 2.5       : classifier-free guidance scale
    #   --sampling-method euler : Euler sampler (recommended by Unsloth)
    #
    entrypoint: ["/sd-server"]
    command:
      - "--diffusion-model"
      - "/models/qwen-image-edit-2511-Q4_K_M.gguf"
      - "--llm"
      - "/models/Qwen2.5-VL-7B-Instruct-UD-Q4_K_XL.gguf"
      - "--vae"
      - "/models/qwen_image_vae.safetensors"
      - "--qwen-image-zero-cond-t"
      - "--offload-to-cpu"
      - "--diffusion-fa"
      - "--flow-shift"
      - "3"
      - "--cfg-scale"
      - "2.5"
      - "--sampling-method"
      - "euler"
      - "-v"
      - "-l"
      - "0.0.0.0"
      - "--listen-port"
      - "8686"
