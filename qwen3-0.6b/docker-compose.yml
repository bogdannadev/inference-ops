services:
  # Qwen3-0.6B-Base - Smallest, best for RAG applications
  qwen3-0.6b-base:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    ports:
      - "8001:8001"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    command: >
      --model Qwen/Qwen3-0.6B
      --port 8001
      --host 0.0.0.0
      --served-model-name qwen3-0.6b-base
      --trust-remote-code
      --max-model-len 32768
      --gpu-memory-utilization 0.9
      --dtype auto
      --tensor-parallel-size 1
      --max-num-seqs 32
      --max-num-batched-tokens 8192
      --enable-chunked-prefill
      --disable-log-stats
      --seed 42
      --swap-space 0
      --generation-config vllm
      --kv-cache-dtype auto
      --enforce-eager
    environment:
      - VLLM_DEFAULT_TEMPERATURE=0.1
      - VLLM_DEFAULT_TOP_P=0.85
      - VLLM_DEFAULT_MAX_TOKENS=512
      - VLLM_DEFAULT-STOP="Question:,ANALYSIS,Document:, TASK:"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['1']
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
