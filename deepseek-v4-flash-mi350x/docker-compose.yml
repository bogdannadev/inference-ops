# =============================================================================
# DEEPSEEK-V4-FLASH — vLLM ROCm TP=1
# Single AMD GPU ROCm lane, OpenAI-compatible API on :8000
# =============================================================================
# Mirrors this docker run:
#   docker run --device=/dev/kfd --device=/dev/dri \
#     --security-opt seccomp=unconfined --group-add video \
#     --privileged --ipc=host -p 8000:8000 \
#     -v ~/.cache/huggingface:/root/.cache/huggingface \
#     -e VLLM_ROCM_USE_AITER=1 \
#     vllm/vllm-openai-rocm:nightly deepseek-ai/DeepSeek-V4-Flash ...
#
# Notes:
#   - This uses the vLLM OpenAI server image entrypoint; the command begins with
#     the model name exactly like your docker run invocation.
#   - Keep --trust-remote-code for DeepSeek-V4 custom model/tokenizer logic.
#   - FP8 KV cache, block-size 256, TP=1, mp backend, and DeepSeek-V4 parsers are
#     carried over verbatim.
#   - For private/gated HF models, export HF_TOKEN before `docker compose up`.
#   - Freeze the image digest for reproducibility once this boots successfully:
#       docker buildx imagetools inspect vllm/vllm-openai-rocm:nightly
# =============================================================================

services:
  deepseek-v4-flash-vllm-rocm:
    image: vllm/vllm-openai-rocm:nightly
    container_name: deepseek-v4-flash-vllm-rocm

    ipc: host
    privileged: true

    ports:
      - "8000:8000"

    devices:
      - /dev/kfd
      - /dev/dri

    group_add:
      - video
      - render

    security_opt:
      - seccomp:unconfined

    # Mirrors --privileged, while keeping SYS_PTRACE useful for ROCm debugging.
    cap_add:
      - SYS_PTRACE

    volumes:
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
      - ./logs:/app/logs
      - /etc/localtime:/etc/localtime:ro

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - PYTHONUNBUFFERED=1
      - VLLM_ROCM_USE_AITER=1
      - VLLM_ROCM_USE_AITER_MOE=1
      # - AITER_ONLINE_TUNE=1
      # - HIP_FORCE_DEV_KERNARG=1
      # - SAFETENSORS_FAST_GPU=1
      # - TORCH_BLAS_PREFER_HIPBLAST=1
      # - HSA_NO_SCRATCH_RECLAIM=1
      # Optional: uncomment if you hit allocator fragmentation on long runs.
      - PYTORCH_ALLOC_CONF=expandable_segments:True
      # Optional OpenAI-compatible API key; only effective if passed via args/env supported by image.
      - VLLM_API_KEY=${VLLM_API_KEY:-}

    command: >
      deepseek-ai/DeepSeek-V4-Flash
      --served-model-name deepseek-v4-flash
      --host 0.0.0.0
      --port 8000
      --trust-remote-code
      --kv-cache-dtype fp8
      --block-size 256
      --tensor-parallel-size 1
      --distributed-executor-backend mp
      --gpu-memory-utilization 0.9
      --max-num-seqs 2
      --max-num-batched-tokens 8192
      --compilation-config '{"cudagraph_mode": "NONE"}'
      --tokenizer-mode deepseek_v4
      --tool-call-parser deepseek_v4
      --enable-auto-tool-choice
      --reasoning-parser deepseek_v4
      --api-key ${VLLM_API_KEY}
      

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 3000s

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

networks:
  default:
    name: deepseek-v4-flash-vllm-rocm-network
