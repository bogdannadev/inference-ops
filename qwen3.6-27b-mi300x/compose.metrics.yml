# =============================================================================
# compose.metrics.yml — SEPARATED observability overlay for the MI300X stack
# -----------------------------------------------------------------------------
# Override pattern. This file adds Prometheus, the OFFICIAL AMD Device Metrics
# Exporter, and Grafana ALONGSIDE the base SGLang service. The inference
# container is not touched. Merge explicitly with -f.
#
# RUN / KÖR:
#   docker compose -f docker-compose.yml -f compose.metrics.yml up -d
# STOP, keep data / STOPPA, behåll data:
#   docker compose -f docker-compose.yml -f compose.metrics.yml down
# WIPE incl. volumes / RADERA inkl. volymer:
#   docker compose -f docker-compose.yml -f compose.metrics.yml down -v
#
# ENDPOINTS / SLUTPUNKTER:
#   Prometheus  http://<host>:9090
#   Grafana     http://<host>:3000          (admin / ${GRAFANA_ADMIN_PASSWORD})
#   SGLang      http://<host>:8002/metrics   <- the inference serving picture
#   AMD GPU     http://<host>:5000/metrics   <- device telemetry
#
# WHY the official exporter and not a hand-rolled amd-smi scraper:
#   On an SR-IOV VF, host-only fields return N/A. A custom scraper that maps
#   N/A -> 0.0 paints a dashboard that LIES (silent zeros). The official
#   exporter does NOT export unsupported fields and logs at boot which fields
#   the platform supports. På en VF är det skillnaden mellan att se sanningen
#   och att se nollor.
#
# DEPENDENCY ON THE BASE COMPOSE (read this):
#   The SGLang /metrics job is only complete if the base server runs with BOTH
#       --enable-metrics            (already present)
#       --enable-cache-report       (MISSING in the current MI300X base compose)
#   Cache-report is what surfaces the HiCache hit ratio — your single most
#   important prefill signal. Add it to the base command before relying on this.
#
# PIN BY DIGEST before production. Tags below are for first bring-up only.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Prometheus — scrapes BOTH the SGLang serving metrics and the AMD exporter.
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.12.0
    container_name: mi300x-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Named volume so the TSDB survives restarts — this is your "check it
      # later" buffer. Namngiven volym så att tidsserierna överlever omstart.
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      # 30 days of retention; tune to taste.
      - --storage.tsdb.retention.time=30d
      # Enables: curl -X POST localhost:9090/-/reload  after editing the config.
      - --web.enable-lifecycle
    restart: unless-stopped
    # No `networks:` key on purpose. The service joins the base compose default
    # network (qwen36-27b-mi300x-network), so it resolves the SGLang and
    # exporter containers by name.

  # ---------------------------------------------------------------------------
  # AMD Device Metrics Exporter (OFFICIAL: ROCm/device-metrics-exporter).
  # Self-contained GPU agent. Exposes Prometheus metrics on :5000/metrics.
  # v1.4.2 is validated against ROCm 7.1.x / host driver 6.16.6 (closest tag).
  # The exporter pairs with the HOST driver, which DigitalOcean owns on a VF —
  # so treat the tag as swappable and confirm field coverage from the boot log.
  # ---------------------------------------------------------------------------
  amd-metrics-exporter:
    image: rocm/device-metrics-exporter:v1.4.2
    container_name: amd-metrics-exporter
    ports:
      - "5050:5000"
    devices:
      - /dev/kfd
      - /dev/dri
    volumes:
      # Required by v1.4.2 for some telemetry paths. Read-only.
      - /sys:/sys:ro
      # OPTIONAL custom field/label selection. Defaults export the full
      # SUPPORTED set (temp, util, mem, power, PCIe, perf). To customise, base
      # it on the example shipped in the exporter repo, drop it at
      # ./exporter/config.json, and uncomment. The exporter polls for config
      # changes every minute — no restart needed.
      # - ./exporter/config.json:/etc/metrics/config.json:ro
    # NOTE: profiler metrics need cap_add: [SYS_ADMIN]. Omitted on purpose —
    # typically unavailable on a VF and a needless privilege. Add only if the
    # boot log says profiler fields are supported AND you want them.
    #
    # FALLBACK: if the exporter cannot read /dev/dri on the droplet, add the
    # render/video groups (the base SGLang service already uses these):
    # group_add:
    #   - video
    #   - render
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Grafana — provisioned datasource + dashboard provider. Drop the OFFICIAL
  # AMD and SGLang dashboard JSONs into ./grafana/dashboards/json (see README).
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.6.0
    container_name: mi300x-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/datasources/datasource.yaml:/etc/grafana/provisioning/datasources/datasource.yaml:ro
      - ./grafana/dashboards/config/dashboard.yaml:/etc/grafana/provisioning/dashboards/dashboard.yaml:ro
      - ./grafana/dashboards/json:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    restart: unless-stopped
    depends_on:
      - prometheus

# Top-level named volumes.
volumes:
  prometheus-data:
  grafana-data: