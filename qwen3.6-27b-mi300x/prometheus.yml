global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ---------------------------------------------------------------------------
  # The whole inference serving picture (SGLang).
  # Needs --enable-metrics AND --enable-cache-report on the SGLang server.
  # cache-report is what exposes the HiCache hit ratio (your #1 prefill signal).
  # Target = the base compose service name, not localhost.
  # ---------------------------------------------------------------------------
  - job_name: "sglang"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["qwen36-27b-sgldev-mi300x:8002"]

  # ---------------------------------------------------------------------------
  # AMD GPU telemetry (official exporter). Default port 5000.
  # ---------------------------------------------------------------------------
  - job_name: "amd-gpu"
    scrape_interval: 10s
    metrics_path: "/metrics"
    static_configs:
      - targets: ["amd-metrics-exporter:5000"]